openapi-processor-mapping: v10

options:
  package-name: io.openapiprocessor.samples.bar

  target-dir:
    layout: standard

  # create property file with server/url path (requires standard target-dir layout)
  base-path:
    server-url: 0
    properties-name: bar.properties

  # generate javadoc from OpenAPI description properties
  javadoc: true

  # use java records instead of pojos
  model-type: record

  # class suffix
  model-name-suffix: Dto

map:
  paths:
    /bar:
      exclude: false
