openapi: 3.1.0
info:
  title: openapi-processor-spring sample api
  version: 1.0.0

paths:
  /ping:
    get:
      tags:
        - ping
      summary: returns a single "pong" string.
      description: very simple sample endpoint
      responses:
        '200':
          description: pong
          content:
            text/plain:
              schema:
                type: string

  /echo:
    get:
      tags:
        - echo
      summary: echos the given parameter string.
      description: sample endpoint with parameter
      parameters:
        - name: source
          description: query, required, string
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: echo of the source parameter
          content:
            text/plain:
              schema:
                type: string

  /foo:
    post:
      tags:
        - foo
      summary: echo a Foo.
      description: simple sample endpoint
      requestBody:
          $ref: '#/components/requestBodies/FooBody'
      responses:
        '200':
          description: foo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Foo'

  /bar:
    post:
      tags:
        - bar
      summary: echo a Bar.
      description: simple sample endpoint
      requestBody:
          $ref: '#/components/requestBodies/BarBody'
      responses:
        '200':
          description: bar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bar'

  /nop:
    get:
      tags:
        - nop
      summary: response status
      description: adds status for success other than 200
      responses:
        '204':
          description: no content

components:
  schemas:
    Foo:
      type: object
      properties:
        foo:
          type: string
          maxLength: 10
        id:
          type: string
          format: uuid
        bar:
          $ref: '#/components/schemas/Bar'

    Bar:
      type: object
      properties:
        bar:
          type: string
          maxLength: 20

  requestBodies:
    FooBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Foo'

    BarBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Bar'
